name: Verify Manifest Files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  verify-manifests:
    name: Verify AI-MANIFEST and README.adoc files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify manifest files exist
        id: verify
        run: |
          set -euo pipefail
          
          # SPDX-License-Identifier: PMPL-1.0-or-later
          
          REPO_ROOT="$GITHUB_WORKSPACE"
          MISSING_MANIFESTS=0
          MISSING_READMES=0
          TOTAL_DIRS=0
          COMPLIANT_DIRS=0
          
          echo "=== Manifest File Verification ==="
          echo "Repository: $GITHUB_REPOSITORY"
          echo ""
          
          # Find all directories (excluding skipped ones)
          while IFS= read -r -d $'\0' dir; do
            # Skip directories that should not have manifests
            dir_name=$(basename "$dir")
            case "$dir_name" in
              .git|.github|.machine_readable|node_modules|.DS_Store|__pycache__|
              .egg-info|.mypy_cache|.pytest_cache|.tox|.nox|.cache|.local|
              build|dist|target|.idea|.vscode|*.swp|*.tmp|.zig-cache)
                continue
                ;;
            esac
            
            # Calculate depth
            relative_path="${dir#$REPO_ROOT/}"
            if [ "$relative_path" = "$dir" ]; then
              # This is the repo root
              depth=0
            else
              # Count slashes
              depth=$(echo "$relative_path" | tr -cd '/' | wc -c)
            fi
            
            TOTAL_DIRS=$((TOTAL_DIRS + 1))
            
            # Determine expected manifest filename
            if [ "$depth" = "0" ]; then
              expected_manifest="$dir/0-AI-MANIFEST.a2ml"
            else
              expected_manifest="$dir/0.${depth}-AI-MANIFEST.a2ml"
            fi
            
            expected_readme="$dir/README.adoc"
            
            # Check manifest exists
            if [ ! -f "$expected_manifest" ]; then
              echo "::error file=$expected_manifest::Missing AI-MANIFEST: $expected_manifest"
              MISSING_MANIFESTS=$((MISSING_MANIFESTS + 1))
            else
              echo "✓ Manifest exists: $expected_manifest"
            fi
            
            # Check README exists (skip root if it has README.md)
            if [ "$depth" = "0" ]; then
              # Root can have either README.adoc or README.md
              if [ ! -f "$expected_readme" ] && [ ! -f "$dir/README.md" ]; then
                echo "::error file=$expected_readme::Missing README: $expected_readme (or README.md)"
                MISSING_READMES=$((MISSING_READMES + 1))
              else
                echo "✓ README exists: $expected_readme or README.md"
              fi
            else
              if [ ! -f "$expected_readme" ]; then
                echo "::error file=$expected_readme::Missing README.adoc: $expected_readme"
                MISSING_READMES=$((MISSING_READMES + 1))
              else
                echo "✓ README exists: $expected_readme"
              fi
            fi
            
            # Count compliant directories
            if [ -f "$expected_manifest" ]; then
              if [ "$depth" = "0" ]; then
                if [ -f "$expected_readme" ] || [ -f "$dir/README.md" ]; then
                  COMPLIANT_DIRS=$((COMPLIANT_DIRS + 1))
                fi
              else
                if [ -f "$expected_readme" ]; then
                  COMPLIANT_DIRS=$((COMPLIANT_DIRS + 1))
                fi
              fi
            fi
            
          done < <(find "$REPO_ROOT" -type d -print0)
          
          echo ""
          echo "=== Verification Summary ==="
          echo "Total directories: $TOTAL_DIRS"
          echo "Compliant directories: $COMPLIANT_DIRS"
          echo "Missing manifests: $MISSING_MANIFESTS"
          echo "Missing READMEs: $MISSING_READMES"
          
          # Set outputs
          echo "total_dirs=$TOTAL_DIRS" >> $GITHUB_OUTPUT
          echo "compliant_dirs=$COMPLIANT_DIRS" >> $GITHUB_OUTPUT
          echo "missing_manifests=$MISSING_MANIFESTS" >> $GITHUB_OUTPUT
          echo "missing_readmes=$MISSING_READMES" >> $GITHUB_OUTPUT
          
          # Fail if any are missing
          if [ "$MISSING_MANIFESTS" -gt 0 ] || [ "$MISSING_READMES" -gt 0 ]; then
            echo "::error::Manifest file verification FAILED"
            echo "Missing $MISSING_MANIFESTS manifest files and $MISSING_READMES README files"
            exit 1
          else
            echo "::notice::All directories have required manifest files!"
            exit 0
          fi

      - name: Generate report
        if: always()
        run: |
          echo "### Manifest Verification Report" >> report.md
          echo "" >> report.md
          echo "- **Repository:** $GITHUB_REPOSITORY" >> report.md
          echo "- **Total Directories:** ${{ steps.verify.outputs.total_dirs }}" >> report.md
          echo "- **Compliant Directories:** ${{ steps.verify.outputs.compliant_dirs }}" >> report.md
          echo "- **Missing Manifests:** ${{ steps.verify.outputs.missing_manifests }}" >> report.md
          echo "- **Missing READMEs:** ${{ steps.verify.outputs.missing_readmes }}" >> report.md
          echo "" >> report.md
          echo "Generated: $(date)" >> report.md
          
          # Upload report as artifact
          mkdir -p reports
          mv report.md reports/
          
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-verification-report
          path: reports/