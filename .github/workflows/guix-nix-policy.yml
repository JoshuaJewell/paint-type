# SPDX-License-Identifier: PMPL-1.0-or-later
name: Guix Package Policy
on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enforce Guix-only reproducible dev shell
        run: |
          # paint-type uses Guix as the sole reproducible-dev vehicle.
          # Nix flakes are retired estate-wide (owner directive 2026-06-01).
          HAS_GUIX=$(find . -name "guix.scm" 2>/dev/null | head -1)
          NIX_LEAKS=$(find . -name "flake.nix" -o -name "flake.lock" 2>/dev/null | head -5)

          NEW_LOCKS=$(git diff --name-only --diff-filter=A HEAD~1 2>/dev/null | grep -E 'package-lock\.json|yarn\.lock|Gemfile\.lock|Pipfile\.lock|poetry\.lock' || true)
          if [ -n "$NEW_LOCKS" ]; then
            echo "⚠️ Lock files detected. Prefer Guix manifests for reproducibility."
          fi

          if [ -n "$NIX_LEAKS" ]; then
            echo "❌ Nix-flake artefacts present — flakes are retired estate-wide."
            echo "$NIX_LEAKS"
            exit 1
          fi

          if [ -n "$HAS_GUIX" ]; then
            echo "✅ guix.scm present (canonical reproducible-dev vehicle)"
          else
            echo "ℹ️ No guix.scm — add one to make the dev shell reproducible."
          fi
