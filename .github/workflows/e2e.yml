#
# e2e.yml — paint-type End-to-End Pipeline Workflow.
#
# Exercises the full v0.2.0 editing pipeline on a single Linux runner:
#   1. Build the Zig FFI library (static + shared libpt artifacts).
#   2. Run the Zig integration test target (`zig build test`).
#   3. Run the Rust `e2e_pipeline` integration test, which drives
#      Tile::composite_over + UndoGraph + pt_layer_* + Brush::stamp end
#      to end through libpt's static archive.
#   4. Run any extra `tests/e2e/scenario_*.sh` script — currently
#      `scenario_libpt_artifacts.sh` (artifact + symbol probe) and
#      `scenario_pipeline_dogfood.sh` (verbose cargo replay).
#
# Gating to push / PR to main keeps minutes-cost predictable; the full
# script runs in <2 minutes on a fresh runner.

name: E2E Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e.sh'
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e.sh'
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E — Full Pipeline (libpt + ephapax)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Zig 0.15
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2.2.1
        with:
          version: 0.15.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2
        with:
          workspaces: src/ephapax -> target

      - name: Run end-to-end pipeline (tests/e2e.sh)
        run: bash tests/e2e.sh

      - name: Write summary
        if: always()
        run: |
          {
            echo "## E2E Pipeline Results"
            echo ""
            echo "Stages exercised:"
            echo "- Zig build (libpt static + shared artifacts)"
            echo "- Zig integration test (\`zig build test\`)"
            echo "- Rust e2e_pipeline integration test (\`cargo test --test e2e_pipeline\`)"
            echo "- Artifact + symbol probe (scenario_libpt_artifacts.sh)"
            echo "- Verbose cargo replay (scenario_pipeline_dogfood.sh)"
          } >> "$GITHUB_STEP_SUMMARY"
