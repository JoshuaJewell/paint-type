# SPDX-License-Identifier: PMPL-1.0-or-later
name: host
on:
  push:
    paths:
      - 'src/host/**'
      - 'src/host_core/**'
      - 'src/paint_core/**'
      - 'src/ui/**'
      - 'third_party/gossamer/**'
      - '.github/workflows/host.yml'
  pull_request:
permissions:
  contents: read
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev xvfb
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1
      - uses: dtolnay/rust-toolchain@stable
      - name: Build libpt
        run: cd src/interface/ffi && zig build
      - name: host_core tests
        run: cargo test --manifest-path src/host_core/Cargo.toml
      - name: Headless e2e
        run: bash tests/e2e/scenario_host_headless.sh
